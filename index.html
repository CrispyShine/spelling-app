<style>
  :root {
    --bg: oklch(0.97 0.02 75);
    --bg-2: oklch(0.99 0.01 75);
    --ink: oklch(0.25 0.02 260);
    --ink-soft: oklch(0.45 0.02 260);
    --ink-faint: oklch(0.70 0.02 260);
    --line: oklch(0.90 0.02 75);
    --line-strong: oklch(0.82 0.02 75);

    --coral: oklch(0.70 0.18 35);
    --coral-ink: oklch(0.40 0.15 35);
    --coral-soft: oklch(0.93 0.05 35);

    --mint: oklch(0.78 0.13 160);
    --mint-ink: oklch(0.40 0.12 160);
    --mint-soft: oklch(0.94 0.05 160);

    --butter: oklch(0.88 0.14 90);
    --butter-ink: oklch(0.50 0.12 80);
    --butter-soft: oklch(0.96 0.05 90);

    --sky: oklch(0.82 0.09 230);
    --sky-ink: oklch(0.40 0.10 230);
    --sky-soft: oklch(0.95 0.03 230);

    --lavender: oklch(0.80 0.07 300);
    --lavender-soft: oklch(0.95 0.03 300);

    --radius: 20px;
    --radius-sm: 12px;
    --radius-lg: 28px;

    --shadow-sm: 0 1px 0 oklch(0.90 0.02 75), 0 4px 12px oklch(0.70 0.02 75 / 0.15);
    --shadow-md: 0 2px 0 oklch(0.88 0.02 75), 0 12px 30px oklch(0.70 0.02 75 / 0.20);
    --shadow-lg: 0 3px 0 oklch(0.85 0.02 75), 0 24px 60px oklch(0.70 0.02 75 / 0.25);

    --font-display: 'Fraunces', ui-serif, Georgia, serif;
    --font-ui: 'Nunito', system-ui, -apple-system, sans-serif;
    --font-mono: 'JetBrains Mono', ui-monospace, monospace;
  }

  /* Theme variants driven by data-theme */
  [data-theme="mint"] {
    --accent: var(--mint);
    --accent-ink: var(--mint-ink);
    --accent-soft: var(--mint-soft);
  }
  [data-theme="coral"] {
    --accent: var(--coral);
    --accent-ink: var(--coral-ink);
    --accent-soft: var(--coral-soft);
  }
  [data-theme="sky"] {
    --accent: var(--sky);
    --accent-ink: var(--sky-ink);
    --accent-soft: var(--sky-soft);
  }
  [data-theme="butter"] {
    --accent: var(--butter);
    --accent-ink: var(--butter-ink);
    --accent-soft: var(--butter-soft);
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: var(--font-ui);
    font-size: 18px;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    min-height: 100vh;
  }

  /* Sprinkled background pattern */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(circle at 12% 18%, var(--butter-soft) 0, transparent 8%),
      radial-gradient(circle at 82% 22%, var(--coral-soft) 0, transparent 9%),
      radial-gradient(circle at 22% 78%, var(--mint-soft) 0, transparent 10%),
      radial-gradient(circle at 88% 82%, var(--lavender-soft) 0, transparent 9%),
      radial-gradient(circle at 50% 50%, var(--sky-soft) 0, transparent 7%);
    opacity: 0.6;
    pointer-events: none;
    z-index: 0;
  }

  #root { position: relative; z-index: 1; min-height: 100vh; }

  button {
    font-family: inherit;
    cursor: pointer;
  }

  input {
    font-family: inherit;
  }

  /* Bouncy keyframes */
  @keyframes pop {
    0% { transform: scale(0.7); opacity: 0; }
    60% { transform: scale(1.15); opacity: 1; }
    100% { transform: scale(1); }
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-8px) rotate(-1deg); }
    40% { transform: translateX(8px) rotate(1deg); }
    60% { transform: translateX(-5px) rotate(-0.5deg); }
    80% { transform: translateX(5px) rotate(0.5deg); }
  }
  @keyframes wiggle {
    0%, 100% { transform: rotate(-2deg); }
    50% { transform: rotate(2deg); }
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }
  @keyframes pulseRing {
    0% { box-shadow: 0 0 0 0 currentColor; opacity: 0.6; }
    100% { box-shadow: 0 0 0 30px currentColor; opacity: 0; }
  }
  @keyframes confettiFall {
    0% { transform: translateY(-10vh) rotate(0); opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }
  @keyframes slideUp {
    from { transform: translateY(16px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
</style>
</head>
